name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Enter package version x.y, e.g. 1.0, for x.y.z, where z auto-increments'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            BASE_VERSION=${GITHUB_REF_NAME#v}
          else
            BASE_VERSION=${{ inputs.version }}
            if [[ -z "${BASE_VERSION}" ]]; then
              echo "Error: version input is required for manual dispatch"
              exit 1
            fi
          fi
          PATCH=${{ github.run_number }}
          VERSION="${BASE_VERSION}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version set to: ${VERSION}"

      - name: Restore
        run: dotnet restore src/Ucu.Poo.ArchitectureMetrics/Ucu.Poo.ArchitectureMetrics.csproj

      - name: Pack
        run: >
          dotnet pack src/Ucu.Poo.ArchitectureMetrics/Ucu.Poo.ArchitectureMetrics.csproj
          --configuration Release
          -p:VersionPrefix=${{ steps.version.outputs.version }}
          -p:VersionSuffix=
          --output ./nupkg

      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      # Push the package
      - name: NuGet push
        run: >
          dotnet nuget push ./nupkg/*.nupkg
          --api-key ${{steps.login.outputs.NUGET_API_KEY}}
          --source https://api.nuget.org/v3/index.json

      - name: Unlist package version on NuGet
        run: >
          dotnet nuget delete Ucu.Poo.ArchitectureMetrics ${{ steps.version.outputs.version }}
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --non-interactive