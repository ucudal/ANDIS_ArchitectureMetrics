name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Enter package version x.y, e.g. 1.0, for x.y.z, where z auto-increments'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize tag to x.y.z format
        if: github.ref_type == 'tag'
        run: |
          CURRENT_TAG=${{ github.ref_name }}
          TAG_WITHOUT_V=${CURRENT_TAG#v}
          DOT_COUNT=$(echo "$TAG_WITHOUT_V" | tr -cd '.' | wc -c)
          
          # Si tiene solo 1 punto (v1.0), agregar .0 (v1.0.0)
          if [[ $DOT_COUNT -eq 1 ]]; then
            NEW_TAG="v${TAG_WITHOUT_V}.0"
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git tag -d "$CURRENT_TAG"
            git tag "$NEW_TAG"
            git push origin :refs/tags/"$CURRENT_TAG" 2>/dev/null || true
            git push origin "$NEW_TAG"
            echo "Tag renamed: $CURRENT_TAG -> $NEW_TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            BASE_VERSION=${GITHUB_REF_NAME#v}
            PATCH=$(git rev-list --count "${GITHUB_REF_NAME}..HEAD" 2>/dev/null || echo "0")
          else
            BASE_VERSION=${{ inputs.version }}
            if [[ -z "${BASE_VERSION}" ]]; then
              echo "Error: version input is required for manual dispatch"
              exit 1
            fi
            PATCH=${{ github.run_number }}
          fi

          if [[ -z "${BASE_VERSION}" ]]; then
            echo "Error: BASE_VERSION is empty"
            exit 1
          fi

          VERSION="${BASE_VERSION}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version set to: ${VERSION}"

      - name: Restore
        run: dotnet restore src/Ucu.Poo.ArchitectureMetrics/Ucu.Poo.ArchitectureMetrics.csproj

      - name: Pack
        run: >
          dotnet pack src/Ucu.Poo.ArchitectureMetrics/Ucu.Poo.ArchitectureMetrics.csproj
          --configuration Release
          -p:VersionPrefix=${{ steps.version.outputs.version }}
          -p:VersionSuffix=
          --output ./nupkg

      # Get a short-lived NuGet API key
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USER }}

      # Push the package
      - name: NuGet push
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}} --source https://api.nuget.org/v3/index.json

