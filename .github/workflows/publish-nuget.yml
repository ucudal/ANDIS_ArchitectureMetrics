name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version x.y (e.g. 1.0) - z auto-increments'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            BASE_VERSION=${GITHUB_REF_NAME#v}
            PATCH=$(git rev-list --count "${GITHUB_REF_NAME}..HEAD" 2>/dev/null || echo "0")
          else
            BASE_VERSION=${{ inputs.version }}
            if [[ -z "${BASE_VERSION}" ]]; then
              echo "Error: version input is required for manual dispatch"
              exit 1
            fi
            PATCH=${{ github.run_number }}
          fi

          if [[ -z "${BASE_VERSION}" ]]; then
            echo "Error: BASE_VERSION is empty"
            exit 1
          fi

          VERSION="${BASE_VERSION}.${PATCH}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version set to: ${VERSION}"

      - name: Restore
        run: dotnet restore src/Ucu.Poo.ArchitectureMetrics/Ucu.Poo.ArchitectureMetrics.csproj

      - name: Pack
        run: >
          dotnet pack src/Ucu.Poo.ArchitectureMetrics/Ucu.Poo.ArchitectureMetrics.csproj
          --configuration Release
          -p:VersionPrefix=${{ steps.version.outputs.version }}
          -p:VersionSuffix=
          --output ./nupkg

      - name: Publish to NuGet with Trusted Publishing
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Unlist package version on NuGet
        run: >
          dotnet nuget delete Ucu.Poo.Dbc ${{ steps.version.outputs.version }}
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --non-interactive
